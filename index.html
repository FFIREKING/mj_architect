<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MJ Architect</title>
    <meta
      name="description"
      content="MJ Architect is a principal-led architecture and planning practice creating high-performance spaces for people and communities."
    />
    <meta name="theme-color" content="#000000" />

    <!-- Canonical + Social -->
    <link rel="canonical" href="https://ardentarch.com/" />
    <meta property="og:site_name" content="MJ Architect" />
    <meta property="og:title" content="MJ Architect" />
    <meta
      property="og:description"
      content="MJ Architect is a principal-led architecture and planning practice creating high-performance spaces for people and communities."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ardentarch.com/" />
    <meta property="og:image" content="https://ardentarch.com/mj-architecture.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://ardentarch.com/mj-architecture.png" />

    <!-- Structured data (helps Google understand your logo/brand) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MJ Architect",
        "url": "https://ardentarch.com/",
        "logo": "https://ardentarch.com/mj-architecture.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
